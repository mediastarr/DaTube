<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>MyTub</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Roboto,system-ui; -webkit-tap-highlight-color:transparent; }
    html, body { background:#0f0f0f; color:#fff; height:100vh; overflow:hidden; }
    #app { height:100vh; width:100vw; display:flex; flex-direction:column; }
    #player { width:100%; height:30vh; background:#000; position:relative; flex:none; }
    #playerFrame { width:100%; height:100%; }
    #playerOverlay { position:absolute; inset:0; z-index:5; background:transparent; }
    header { display:flex; align-items:center; padding:8px; background:#212121; gap:8px; flex:none; }
    #logo { font-size:18px; font-weight:700; color:#f00; padding:12px; }
   .btn { padding:14px 18px; cursor:pointer; opacity:0.7; font-size:15px; font-weight:600; border-radius:8px; min-height:44px; min-width:44px; }
   .btn:active { opacity:1; background:#333; }
   .btn.active { opacity:1; background:#333; }
    #searchBtn { flex:1; margin-left:8px; padding:14px; background:#121212; border:1px solid #303030; color:#aaa; border-radius:20px; font-size:14px; text-align:left; min-height:44px; }
    #keyboard { background:#212121; padding:8px; max-height:0; overflow:hidden; transition:max-height 0.2s ease; flex:none; }
    #keyboard.show { max-height:340px; }
   .row { display:grid; grid-template-columns:repeat(10,1fr); gap:4px; margin-bottom:4px; }
    button { padding:20px 0; background:#3a3a3a; border:none; color:#fff; border-radius:8px; font-size:16px; font-weight:700; min-height:44px; }
    button:active { background:#555; }
   .wide { grid-column:span 2; }
   .space { grid-column:span 4; }
   .go { background:#f00; grid-column:span 10; }
    #content { flex:1 1 auto; overflow-y:scroll; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
   .vid { display:flex; padding:8px; gap:10px; border-bottom:1px solid #222; min-height:106px; }
   .vid:active { background:#222; }
   .thumb { width:160px; height:90px; object-fit:cover; border-radius:8px; flex-shrink:0; }
   .meta { flex:1; }
   .title { font-size:14px; line-height:1.3; font-weight:500; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
   .channel { font-size:12px; color:#aaa; }
   .msg { text-align:center; padding:20px; color:#666; font-size:13px; line-height:1.5; word-break:break-all; }
   .searchRow { display:flex; gap:8px; padding:8px; background:#181818; }
    #q { flex:1; padding:14px; background:#222; border:2px solid #333; color:#fff; border-radius:8px; font-size:16px; text-align:center; font-weight:600; }
  </style>
</head>
<body>
  <div id="app">
    <div id="player"><div id="playerFrame">Select a video</div><div id="playerOverlay"></div></div>
    <header>
      <div id="logo">MT</div>
      <div class="btn active" id="btnHome">Home</div>
      <div class="btn" id="btnTrend">Trending</div>
      <div id="searchBtn">Search YouTube</div>
    </header>
    <div id="keyboard"><div class="searchRow"><input id="q" placeholder="Type to search" readonly></div></div>
    <div id="content"><div class="msg">Initializing...</div></div>
  </div>
<script>
  const API_KEY = 'AIzaSyDPmr_fTvcNJzv6UAkjFn8-IbD0lGhZI6s'; // Put key in quotes!
  const REGION = 'US'; // Back to US - GB was causing 404 for some users
  let query = '', isPaused = false;

  function addTap(el, fn) {
    if (!el) return;
    el.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, {passive:false});
    el.addEventListener('click', fn);
  }

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    const rows = [
      ['q','w','e','r','t','y','u','i','o','p'],
      ['a','s','d','f','g','h','j','k','l'],
      ['shift','z','x','c','v','b','n','m','⌫'],
      ['123','space','Enter']
    ];
    rows.forEach((keys, i) => {
      const row = document.createElement('div'); 
      row.className = 'row';
      if (i === 1) row.style.padding = '0 5%';
      if (i === 2) row.style.padding = '0 10%';
      keys.forEach(k => {
        let b = document.createElement('button');
        b.textContent = k;
        if (k === '⌫' || k === '123') b.className = 'wide';
        if (k === 'space') b.className = 'space';
        if (k === 'Enter') b.className = 'go';
        addTap(b, () => keyPress(k));
        row.appendChild(b);
      });
      kb.appendChild(row);
    });
    addTap(document.getElementById('btnHome'), () => { setTab('btnHome'); loadHome(); });
    addTap(document.getElementById('btnTrend'), () => { setTab('btnTrend'); loadTrending(); });
    addTap(document.getElementById('searchBtn'), showKeyboard);
    addTap(document.getElementById('playerOverlay'), togglePause);
    setTimeout(loadHome, 500);
  }

  function showKeyboard() {
    document.getElementById('keyboard').classList.add('show');
    document.getElementById('searchBtn').style.display = 'none';
    if (navigator.vibrate) navigator.vibrate(8);
  }

  function hideKeyboard() {
    document.getElementById('keyboard').classList.remove('show');
    document.getElementById('searchBtn').style.display = 'block';
  }

  function keyPress(k) {
    if (navigator.vibrate) navigator.vibrate(10);
    if (k === '⌫') query = query.slice(0,-1);
    else if (k === 'space') query += ' ';
    else if (k === 'Enter') { search(); hideKeyboard(); return; }
    else if (k !== '123' && k !== 'shift') query += k;
    document.getElementById('q').value = query;
  }

  function setTab(id) {
    document.querySelectorAll('.btn').forEach(t => t.classList.remove('active'));
    if (id) document.getElementById(id).classList.add('active');
    hideKeyboard();
  }

  async function fetchVideos(endpoint) {
    const content = document.getElementById('content');
    if (API_KEY === 'AIzaSyDPmr_fTvcNJzv6UAkjFn8-IbD0lGhZI6s' || !API_KEY) {
      content.innerHTML = '<div class="msg">ERROR: Add YouTube API key in quotes</div>';
      return;
    }
    const url = `https://www.googleapis.com/youtube/v3/${endpoint}&key=${API_KEY}`;
    content.innerHTML = `<div class="msg">Calling:<br>${url}</div>`;
    
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) {
        content.innerHTML = `<div class="msg">HTTP ${res.status} Error<br><br>${data.error?.message || 'Not Found'}<br><br>URL:<br>${url}</div>`;
        return;
      }
      if (data.error) {
        content.innerHTML = `<div class="msg">API Error: ${data.error.message}<br><br>URL:<br>${url}</div>`;
        return;
      }
      renderVideos(data.items);
    } catch(e) {
      content.innerHTML = `<div class="msg">Network Error<br><br>${e.message}<br><br>URL:<br>${url}</div>`;
    }
  }

  function loadHome() {
    fetchVideos(`videos?part=snippet&chart=mostPopular&maxResults=50&regionCode=${REGION}`);
  }

  function loadTrending() {
    fetchVideos(`videos?part=snippet&chart=mostPopular&maxResults=50&regionCode=${REGION}`);
  }

  function search() {
    if (!query.trim()) return;
    setTab('');
    fetchVideos(`search?part=snippet&type=video&maxResults=50&q=${encodeURIComponent(query)}&regionCode=${REGION}`);
  }

  function renderVideos(items) {
    const content = document.getElementById('content');
    content.innerHTML = '';
    if (!items || !items.length) {
      content.innerHTML = '<div class="msg">No videos found</div>';
      return;
    }
    items.forEach(v => {
      const vidId = v.id.videoId || v.id;
      const s = v.snippet;
      let div = document.createElement('div');
      div.className = 'vid';
      div.innerHTML = `<img class="thumb" src="${s.thumbnails.medium.url}"><div class="meta"><div class="title">${s.title}</div><div class="channel">${s.channelTitle}</div></div>`;
      addTap(div, () => playVideo(vidId));
      content.appendChild(div);
    });
  }

  function playVideo(id) {
    if (navigator.vibrate) navigator.vibrate([10,20,10]);
    isPaused = false;
    document.getElementById('playerFrame').innerHTML = `<iframe id="ytFrame" width="100%" height="100%" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&enablejsapi=1&modestbranding=1&rel=0&playsinline=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    document.getElementById('content').scrollTop = 0;
    hideKeyboard();
  }

  function togglePause() {
    const iframe = document.getElementById('ytFrame');
    if (!iframe) return;
    const cmd = isPaused ? 'playVideo' : 'pauseVideo';
    iframe.contentWindow.postMessage(JSON.stringify({event:'command',func:cmd,args:''}), '*');
    isPaused = !isPaused;
    if (navigator.vibrate) navigator.vibrate(8);
  }
</script>
</body>
</html>
